<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EMP财务协作系统 - CloudBase稳定版</title>
    <script src="https://imgcache.qq.com/qcloud/tcbjs/2.0.0/tcb.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, 'Segoe UI', sans-serif; }
        body { background: #eef2f6; padding: 20px; }
        body.dark-mode { background: #0f172a; color: #e2e8f0; }
        body.dark-mode .stat-card, body.dark-mode .toolbar, body.dark-mode .table-wrapper { background: #1e293b; border-color: #334155; }
        .container { max-width: 1600px; margin: 0 auto; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 16px 20px; border-radius: 20px; border: 1px solid #e2edf2; }
        .stat-val { font-size: 28px; font-weight: 800; margin-top: 6px; display: block; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: white; padding: 14px 18px; border-radius: 24px; margin-bottom: 20px; border: 1px solid #e2edf2; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-primary { background: #0f3b5c; color: white; }
        .btn-success { background: #166534; color: white; }
        .btn-warning { background: #ea580c; color: white; }
        .btn-danger { background: #b91c1c; color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
        .btn-secondary { background: #6c757d; color: white; }
        .filter-group { display: flex; gap: 8px; align-items: center; background: #f1f5f9; padding: 5px 12px; border-radius: 40px; }
        .filter-group input, .filter-group select { background: transparent; border: none; padding: 6px 0; outline: none; }
        .mode-switch { background: #f1f5f9; padding: 6px 14px; border-radius: 40px; display: inline-flex; align-items: center; gap: 10px; font-size: 12px; }
        .table-wrapper { background: white; border-radius: 20px; border: 1px solid #e2edf2; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1350px; }
        th { background: #f8fafc; padding: 14px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
        .pending-row { background-color: #fff9eb !important; }
        .badge-wait { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 40px; font-size: 11px; display: inline-block; }
        .badge-done { background: #dcfce7; color: #15803d; padding: 2px 8px; border-radius: 40px; font-size: 11px; display: inline-block; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 12px; margin: 0 2px; padding: 4px 8px; border-radius: 30px; }
        .action-btn.claim { background: #fef3c7; color: #b45309; }
        .action-btn.del { color: #9ca3af; }
        .action-btn.del:hover { color: #dc2626; background: #fee2e2; }
        .action-btn.freight { background: #cffafe; color: #0891b2; }
        .freight-detail { background: #f1f5f9; border-radius: 12px; padding: 6px 10px; margin-top: 6px; font-size: 11px; border-left: 3px solid #0891b2; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .admin-panel { background: #fefce8; border-left: 4px solid #f59e0b; margin-bottom: 20px; }
        .password-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #e2edf2; flex-wrap: wrap; gap: 10px; }
        .fee-col { color: #dc2626; font-weight: 500; }
        body.dark-mode .mode-switch { background: #0f172a; }
        body.dark-mode .freight-detail { background: #0f172a; }
        .status-bar { background: #f1f5f9; padding: 8px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between">
        <h1><i class="fas fa-hand-holding-usd"></i> EMP 财务协作系统 (CloudBase稳定版)</h1>
        <button id="darkModeToggle" class="btn btn-outline">🌙 深色模式</button>
    </div>

    <div class="status-bar">
        <span>🔌 连接状态: <span id="connStatus">初始化中...</span></span>
        <button id="testConnBtn" class="btn btn-outline" style="padding: 2px 10px;">重新连接</button>
    </div>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal" style="display: flex;">
        <div style="background:white;border-radius:24px;padding:24px;max-width:350px;text-align:center;">
            <h3>EMP 财务协作</h3>
            <div style="margin:16px 0;"><input type="password" id="loginPass" placeholder="密码" style="width:100%;padding:12px;border-radius:40px;"></div>
            <div style="margin:16px 0;"><select id="loginUser" style="width:100%;padding:12px;border-radius:40px;"></select></div>
            <button class="btn btn-primary" id="loginBtn" style="width:100%;">进入</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <div id="adminPanel" class="toolbar admin-panel" style="display:none; flex-direction:column;">
            <div><i class="fas fa-key"></i> 密码管理（仅管理员可见）</div>
            <div id="passwordList"></div>
        </div>

        <div class="dashboard">
            <div class="stat-card"><span>待认领</span><span class="stat-val" id="statPending">0</span></div>
            <div class="stat-card"><span>总到款笔数</span><span class="stat-val" id="statTotal">0</span></div>
            <div class="stat-card"><span>RMB总额</span><span class="stat-val" id="statTotalRmb">¥0.00</span></div>
        </div>

        <div id="financePanel" style="display:none;" class="toolbar" style="background:#fefce8;">
            <i class="fas fa-coins"></i><span>财务操作区</span>
            <input type="number" id="quickAmt" placeholder="金额" style="width:90px;">
            <select id="quickCur"><option value="USD">USD</option><option value="CNY">CNY</option></select>
            <input type="number" id="quickRate" placeholder="汇率" value="6.85" step="0.01" style="width:70px;">
            <select id="quickAcc"><option>中国银行</option><option>VTB</option><option>港户</option><option>私户</option></select>
            <button class="btn btn-primary" onclick="publishPending()">挂单</button>
            <button class="btn btn-danger" onclick="clearAllData()">一键清空</button>
            <button class="btn btn-secondary" onclick="showFieldManager()">管理自定义字段</button>
        </div>

        <div id="salesPanel" style="display:none;" class="toolbar">
            <div class="filter-group"><input type="text" id="searchInput2" placeholder="合同号/客户" onkeyup="renderTable()"></div>
            <div class="spacer"></div>
            <span>跟单模式：只能认领</span>
        </div>

        <div id="financeToolbar" style="display:none;" class="toolbar">
            <button class="btn btn-success" onclick="exportData()">导出Excel</button>
            <div class="mode-switch">
                <label><input type="radio" name="importMode" value="smart" checked> 智能防重</label>
                <label><input type="radio" name="importMode" value="force"> 强制保留</label>
            </div>
            <div class="filter-group"><input type="text" id="searchInput" placeholder="合同号/客户" onkeyup="renderTable()"></div>
            <div class="filter-group">
                <select id="staffFilterSelect" onchange="renderTable()"><option value="">全部业务员</option></select>
            </div>
            <div class="spacer"></div>
            <input type="file" id="excelFileInput" accept=".xlsx, .xls">
            <button class="btn btn-warning" onclick="importExcel()">导入Excel</button>
            <button class="btn btn-outline" onclick="showPasteModal()">粘贴板</button>
        </div>

        <div class="table-wrapper">
            <table id="mainTable">
                <thead id="tableHeader">
                    <tr id="headerRow">
                        <th>#</th><th>操作</th><th>状态</th><th>到账日期</th><th>账户</th><th>合同号</th><th>客户</th><th>币种/金额</th><th>手续费</th><th>实到金额</th><th>折算RMB</th><th>运费</th><th>负责人</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ========== CloudBase 配置（已填入您的环境ID） ==========
    const ENV_ID = "inquiry-system625-3e4fr8a65fd7de";
    let app, db;
    let currentUser = '';
    let isFinance = false;
    let isAdmin = false;
    let allRecords = [];
    let freightCache = {};
    let customFields = [];
    let watchHandle = null;

    // 人员列表
    const ADMIN_USER = "王丽娜";
    const FINANCE_USERS = ["李月", "李洋洋"];
    const SALES_USERS = ["谭硕", "曲宁", "常超", "于圣一", "张娜", "孙秋迪"];
    const ALL_STAFF = [ADMIN_USER, ...FINANCE_USERS, ...SALES_USERS];

    // 密码存储（本地）
    let passwords = {
        "王丽娜": "555", "李月": "666", "李洋洋": "666",
        "谭硕": "888", "曲宁": "888", "常超": "888", "于圣一": "888", "张娜": "888", "孙秋迪": "888"
    };

    function loadPasswords() {
        const saved = localStorage.getItem('emp_finance_passwords');
        if (saved) try { Object.assign(passwords, JSON.parse(saved)); } catch(e) {}
    }
    function savePasswords() { localStorage.setItem('emp_finance_passwords', JSON.stringify(passwords)); }
    function verifyLogin(user, pwd) { return passwords[user] === pwd; }
    loadPasswords();

    // 深色模式
    let darkMode = localStorage.getItem('darkMode') === 'true';
    if (darkMode) document.body.classList.add('dark-mode');
    document.getElementById('darkModeToggle').addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    });

    // 初始化 CloudBase 并匿名登录
    async function initCloudBase() {
        try {
            app = cloudbase.init({ env: ENV_ID, region: "ap-shanghai" });
            await app.auth().anonymousAuthProvider().signIn();
            db = app.database();
            document.getElementById('connStatus').innerHTML = '✅ 已连接 CloudBase';
            return true;
        } catch (err) {
            console.error(err);
            document.getElementById('connStatus').innerHTML = '❌ 连接失败: ' + err.message;
            alert('CloudBase 连接失败，请确保：\n1. 通过 http:// 或 https:// 访问（不要直接双击打开）\n2. 环境 ID 正确\n3. 已开启匿名登录');
            db = null;
            return false;
        }
    }

    // 初始化登录框的用户列表
    function populateUserSelect() {
        const select = document.getElementById('loginUser');
        select.innerHTML = ALL_STAFF.map(n => `<option value="${n}">${n}</option>`).join('');
    }

    // 登录处理
    document.getElementById('loginBtn').onclick = async () => {
        const pwd = document.getElementById('loginPass').value;
        const user = document.getElementById('loginUser').value;
        if (!verifyLogin(user, pwd)) {
            alert('密码错误');
            return;
        }
        currentUser = user;
        isFinance = FINANCE_USERS.includes(user);
        isAdmin = (user === ADMIN_USER);

        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';

        document.getElementById('financePanel').style.display = (isFinance || isAdmin) ? 'flex' : 'none';
        document.getElementById('financeToolbar').style.display = (isFinance || isAdmin) ? 'flex' : 'none';
        document.getElementById('salesPanel').style.display = (!isFinance && !isAdmin) ? 'flex' : 'none';
        document.getElementById('adminPanel').style.display = isAdmin ? 'flex' : 'none';

        if (isAdmin) {
            let html = '';
            for (let u of ALL_STAFF) {
                let role = u === ADMIN_USER ? '管理员' : (FINANCE_USERS.includes(u) ? '财务' : '跟单');
                html += `<div class="password-item"><div><strong>${u}</strong> (${role})<br>当前密码：${passwords[u]}</div>
                    <div><input type="password" id="newPwd_${u}" placeholder="新密码" style="padding:6px 12px;border-radius:30px;width:130px;">
                    <button class="btn btn-secondary" onclick="updatePassword('${u}')">修改</button></div></div>`;
            }
            document.getElementById('passwordList').innerHTML = html;
        }

        const staffSelect = document.getElementById('staffFilterSelect');
        if (staffSelect) staffSelect.innerHTML = '<option value="">全部业务员</option>' + ALL_STAFF.map(s => `<option value="${s}">${s}</option>`).join('');

        // 确保数据库已初始化
        if (!db) {
            const ok = await initCloudBase();
            if (!ok) {
                alert("CloudBase 初始化失败，请检查网络或配置后刷新页面重试。");
                return;
            }
        }
        await loadCustomFields();
        startWatch();
    };

    window.updatePassword = function(user) {
        const input = document.getElementById(`newPwd_${user}`);
        const newPwd = input.value.trim();
        if (!newPwd) { alert('请输入新密码'); return; }
        passwords[user] = newPwd;
        savePasswords();
        input.value = '';
        alert(`${user} 密码已修改`);
        location.reload();
    };

    // ========== 运费功能 ==========
    function getFreightId(record) {
        if (!record.contract || record.contract === '—') return null;
        return `${record.contract}_${record.date || ''}_${record.actual || 0}`;
    }
    async function getFreight(record) {
        if (!db) return { amount: '', detail: '' };
        const fid = getFreightId(record);
        if (!fid) return { amount: '', detail: '' };
        if (freightCache[fid]) return freightCache[fid];
        try {
            const res = await db.collection('freight').doc(fid).get();
            if (res.data) {
                const data = { amount: res.data.freightAmount || '', detail: res.data.freightDetail || '' };
                freightCache[fid] = data;
                return data;
            }
            return { amount: '', detail: '' };
        } catch(e) { return { amount: '', detail: '' }; }
    }
    async function setFreight(record, amount, detail) {
        if (!db) return false;
        const fid = getFreightId(record);
        if (!fid) return false;
        await db.collection('freight').doc(fid).set({
            freightId: fid, contractNo: record.contract, date: record.date,
            amount: record.actual, freightAmount: amount, freightDetail: detail,
            updatedBy: currentUser, updatedAt: new Date()
        });
        freightCache[fid] = { amount, detail };
        return true;
    }
    window.showFreightModal = async (recordId) => {
        const record = allRecords.find(r => r._id === recordId);
        if (!record) return;
        if (!record.contract || record.contract === '—') { alert('该记录暂无合同号'); return; }
        const freight = await getFreight(record);
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div style="background:white;border-radius:24px;padding:24px;max-width:500px;">
                <h4>✏️ 运费登记</h4>
                <p>合同号：${record.contract}<br>到账日期：${record.date || ''}<br>金额：${record.cur} ${(record.actual||0).toLocaleString()}</p>
                <div><label>运费金额：</label><input type="text" id="freightAmount" value="${freight.amount || ''}" placeholder="例如：¥500 或 无运费" style="width:100%; padding:8px; margin:10px 0; border-radius:12px; border:1px solid #cbd5e1;"></div>
                <div><label>运费明细：</label><textarea id="freightDetail" rows="3" placeholder="例如：顺丰空运，单号SF123456789" style="width:100%; padding:8px; border-radius:12px; border:1px solid #cbd5e1;">${freight.detail || ''}</textarea></div>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
                    <button class="btn btn-outline" onclick="this.closest('.modal').remove()">取消</button>
                    <button class="btn btn-primary" id="saveFreightBtn">保存</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('saveFreightBtn').onclick = async () => {
            const amount = document.getElementById('freightAmount').value.trim();
            const detail = document.getElementById('freightDetail').value.trim();
            if (!amount) { alert('请填写运费金额（可填"无运费"）'); return; }
            await setFreight(record, amount, detail);
            alert('运费已保存');
            modal.remove();
            renderTable();
        };
    };

    // ========== 自定义字段管理 ==========
    async function loadCustomFields() {
        if (!db) return;
        try {
            const res = await db.collection('config').doc('customFields').get();
            customFields = (res.data && res.data.fields) ? res.data.fields : [];
        } catch(e) { customFields = []; }
        updateTableHeader();
    }
    async function saveCustomFields(fields) {
        if (!db) return;
        customFields = fields;
        await db.collection('config').doc('customFields').set({ fields });
        updateTableHeader();
        renderTable();
    }
    function updateTableHeader() {
        const headerRow = document.getElementById('headerRow');
        if (!headerRow) return;
        let html = '<th>#</th><th>操作</th><th>状态</th><th>到账日期</th><th>账户</th><th>合同号</th><th>客户</th><th>币种/金额</th><th>手续费</th><th>实到金额</th><th>折算RMB</th><th>运费</th><th>负责人</th>';
        for (let f of customFields) html += `<th>${escapeHtml(f.name)}</th>`;
        headerRow.innerHTML = html;
    }
    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }
    window.showFieldManager = async () => {
        await loadCustomFields();
        let modal = document.createElement('div');
        modal.className = 'modal';
        let fieldsHtml = '';
        for (let i = 0; i < customFields.length; i++) {
            fieldsHtml += `<div style="display:flex; gap:8px; margin-bottom:8px;">
                <input type="text" value="${escapeHtml(customFields[i].name)}" id="fieldName_${i}" style="flex:1; padding:6px; border-radius:12px; border:1px solid #cbd5e1;">
                <select id="fieldType_${i}" style="padding:6px; border-radius:12px;">
                    <option value="text" ${customFields[i].type === 'text' ? 'selected' : ''}>文本</option>
                    <option value="number" ${customFields[i].type === 'number' ? 'selected' : ''}>数字</option>
                </select>
                <button class="btn btn-danger" onclick="removeField(${i})" style="padding:4px 12px;">删除</button>
            </div>`;
        }
        modal.innerHTML = `
            <div style="background:white;border-radius:24px;padding:24px;max-width:500px;width:90%;">
                <h4>管理自定义字段</h4>
                <div id="fieldsContainer">${fieldsHtml}</div>
                <button class="btn btn-outline" onclick="addField()" style="margin:10px 0; width:100%;">+ 添加新字段</button>
                <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
                    <button class="btn btn-outline" onclick="this.closest('.modal').remove()">取消</button>
                    <button class="btn btn-primary" id="saveFieldsBtn">保存</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('saveFieldsBtn').onclick = async () => {
            let newFields = [];
            for (let i = 0; i < customFields.length; i++) {
                let nameInput = document.getElementById(`fieldName_${i}`);
                let typeSelect = document.getElementById(`fieldType_${i}`);
                if (nameInput && nameInput.value.trim()) {
                    newFields.push({ name: nameInput.value.trim(), type: typeSelect.value });
                }
            }
            await saveCustomFields(newFields);
            modal.remove();
            alert('自定义字段已保存');
        };
    };
    window.addField = function() { customFields.push({ name: '新字段', type: 'text' }); showFieldManager(); };
    window.removeField = function(index) { customFields.splice(index, 1); showFieldManager(); };

    // 数据监听和渲染
    function startWatch() {
        if (!db) return;
        if (watchHandle) watchHandle.close();
        watchHandle = db.collection('payments').watch({
            onChange: () => refreshAllData(),
            onError: (err) => console.error('监听出错', err)
        });
        refreshAllData();
    }

    async function refreshAllData() {
        if (!db) return;
        try {
            const res = await db.collection('payments').orderBy('orderSeq', 'asc').get();
            allRecords = [];
            for (let doc of res.data) {
                let d = doc;
                if (d.acc && d.acc.includes("VTB")) d.cur = "CNY";
                if (d.cur === "CNY") { d.rate = 1; d.rmbValue = d.actual || 0; }
                else if (!d.rate) d.rate = 6.85;
                if (d.rmbValue === undefined && d.actual) d.rmbValue = d.cur === "CNY" ? d.actual : d.actual * d.rate;
                allRecords.push({ _id: doc._id, ...d });
            }
            document.getElementById('connStatus').innerHTML = `✅ 已加载 ${allRecords.length} 条记录`;
            for (let r of allRecords) if (r.contract && r.contract !== '—') await getFreight(r);
            renderTable();
        } catch (err) {
            console.error('加载数据失败', err);
            document.getElementById('connStatus').innerHTML = '❌ 数据加载失败';
        }
    }

    function getFilteredRecords() {
        let searchTerm = '';
        if (isFinance || isAdmin) {
            searchTerm = (document.getElementById('searchInput')?.value || '').toLowerCase();
        } else {
            searchTerm = (document.getElementById('searchInput2')?.value || '').toLowerCase();
        }
        let staffFilter = (isFinance || isAdmin) ? (document.getElementById('staffFilterSelect')?.value || '') : '';
        let normalizedSearch = searchTerm.replace(/\s/g, '');
        let filtered = [...allRecords];
        if (searchTerm) {
            filtered = filtered.filter(r => {
                let contractNorm = (r.contract || '').toLowerCase().replace(/\s/g, '');
                let customerNorm = (r.customer || '').toLowerCase().replace(/\s/g, '');
                return contractNorm.includes(normalizedSearch) || customerNorm.includes(normalizedSearch);
            });
        }
        if (staffFilter) filtered = filtered.filter(r => r.recorder === staffFilter);
        return filtered;
    }

    window.renderTable = async function() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) return;
        let filtered = getFilteredRecords();
        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="${13 + customFields.length}" style="text-align:center;padding:40px;">暂无数据，请导入Excel或检查筛选条件</td><td style="text-align:center;padding:40px;">暂无数据，请导入Excel或检查筛选条件</td></table>`;
            updateStats();
            return;
        }
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            const r = filtered[i];
            let isPending = r.status === '待认领';
            let canClaim = isPending && currentUser;
            let canDel = (isFinance || isAdmin);
            let feeAmount = r.fee || 0;
            let actualAmount = (r.actual || 0) - feeAmount;
            let freight = freightCache[getFreightId(r)] || { amount: '', detail: '' };
            let freightDisplay = freight.amount || '未登记';
            let freightDetailDisplay = freight.detail ? `<div class="freight-detail">🚚 ${freight.detail}</div>` : '';
            html += `<tr class="${isPending ? 'pending-row' : ''}">
                <td class="serial-num">${i+1}</td>
                <td style="white-space:nowrap">
                    ${canClaim ? `<button class="action-btn claim" onclick="claim('${r._id}')">认领</button>` : ''}
                    ${canDel ? `<button class="action-btn del" onclick="deleteRecord('${r._id}')">删除</button>` : ''}
                    ${r.contract && r.contract !== '—' ? `<button class="action-btn freight" onclick="showFreightModal('${r._id}')">✏️运费</button>` : ''}
                </td>
                <td>${isPending ? '<span class="badge-wait">待认领</span>' : '<span class="badge-done">已入账</span>'}</td>
                <td>${r.date || ''}</td>
                <td>${r.acc || ''}</td>
                <td><strong>${r.contract || '—'}</strong></td>
                <td>${r.customer || '—'}</td>
                <td>${r.cur} ${(r.actual||0).toLocaleString()}</td>
                <td class="fee-col">${feeAmount > 0 ? feeAmount.toFixed(2) : '-'}</td>
                <td>${actualAmount.toLocaleString()}</td>
                <td>¥ ${(r.rmbValue||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                <td style="max-width:180px;">
                    <span style="cursor:pointer; color:#0891b2;" onclick="showFreightModal('${r._id}')">${freightDisplay}</span>
                    ${freightDetailDisplay}
                </td>
                <td>${r.recorder || '未认领'}</td>`;
            for (let f of customFields) {
                let val = r.customFields ? r.customFields[f.name] : '';
                html += `<td>${val || '-'}</td>`;
            }
            html += `</tr>`;
        }
        tbody.innerHTML = html;
        updateStats();
    };

    function updateStats() {
        let pending = allRecords.filter(r => r.status === '待认领').length;
        let totalRmb = allRecords.reduce((s,r) => s + (r.rmbValue||0), 0);
        document.getElementById('statPending').innerText = pending;
        document.getElementById('statTotal').innerText = allRecords.length;
        document.getElementById('statTotalRmb').innerHTML = '¥ ' + totalRmb.toLocaleString(undefined,{minimumFractionDigits:2});
    }

    // ========== CRUD 操作 ==========
    window.claim = async (id) => {
        if (!db) { alert("数据库未连接"); return; }
        let r = allRecords.find(x => x._id === id);
        if (!r || r.status !== '待认领') return alert('不可认领');
        let contract = prompt("合同号", r.contract || "");
        if (!contract) return;
        let customer = prompt("客户名称", r.customer || "");
        if (!customer) return;
        let cleanContract = contract.trim().replace(/\s/g, '');
        await db.collection('payments').doc(id).update({
            contract: cleanContract, customer: customer.trim(), status: "已入账", recorder: currentUser
        });
        alert("认领成功");
        refreshAllData();
    };

    window.deleteRecord = async (id) => {
        if (!db) { alert("数据库未连接"); return; }
        if (!(isFinance || isAdmin)) return alert("无权限");
        const pwd = prompt("删除需要密码111：");
        if (pwd !== '111') { alert("密码错误"); return; }
        if (confirm("确认删除？")) await db.collection('payments').doc(id).remove();
    };

    window.publishPending = async () => {
        if (!db) { alert("数据库未连接"); return; }
        if (!(isFinance || isAdmin)) return alert("无权限");
        let amt = parseFloat(document.getElementById('quickAmt').value);
        if (!amt) return alert("金额");
        let cur = document.getElementById('quickCur').value;
        let acc = document.getElementById('quickAcc').value;
        if (acc.includes("VTB")) cur = "CNY";
        let rate = cur === "CNY" ? 1 : parseFloat(document.getElementById('quickRate').value) || 6.85;
        let rmb = cur === "CNY" ? amt : amt * rate;
        await db.collection('payments').add({
            actual: amt, cur, rate, rmbValue: rmb, acc, fee: 0, status: "待认领", contract: "", customer: "", recorder: "",
            date: new Date().toISOString().slice(0,10), orderSeq: Date.now(), createTime: new Date()
        });
        document.getElementById('quickAmt').value = '';
        alert("已挂单");
        refreshAllData();
    };

    window.clearAllData = async () => {
        if (!db) { alert("数据库未连接"); return; }
        if (!(isFinance || isAdmin)) return alert("无权限");
        const pwd = prompt("⚠️ 清空所有数据需要密码111：");
        if (pwd !== '111') { alert("密码错误"); return; }
        if (!confirm("确认删除全部数据？此操作不可恢复！")) return;
        const res = await db.collection('payments').get();
        for (let doc of res.data) await db.collection('payments').doc(doc._id).remove();
        const freightRes = await db.collection('freight').get();
        for (let doc of freightRes.data) await db.collection('freight').doc(doc._id).remove();
        freightCache = {};
        alert("已清空所有记录");
        refreshAllData();
    };

    // ========== 导入导出（增强匹配） ==========
    function getImportMode() {
        let radios = document.getElementsByName('importMode');
        for (let r of radios) if (r.checked) return r.value;
        return 'smart';
    }

    function parseDate(v) {
        if (!v) return new Date().toISOString().slice(0,10);
        if (typeof v === 'number') { 
            let d = new Date((v - 25569) * 86400000); 
            if (!isNaN(d)) return d.toISOString().slice(0,10); 
        }
        let d = new Date(v);
        if (!isNaN(d)) return d.toISOString().slice(0,10);
        return new Date().toISOString().slice(0,10);
    }

    // 智能匹配列名
    function matchColumn(columns, keywords) {
        for (let kw of keywords) {
            const normalizedKw = kw.normalize('NFKC').toLowerCase().replace(/\s/g, '');
            for (let col of columns) {
                const normalizedCol = col.normalize('NFKC').toLowerCase().replace(/\s/g, '');
                if (normalizedCol === normalizedKw || normalizedCol.includes(normalizedKw)) {
                    return col;
                }
            }
        }
        return null;
    }

    async function importRecords(recordsList, sourceName) {
        if (!db) throw new Error("数据库未连接");
        let mode = getImportMode();
        let existing = new Set();
        const existingSnap = await db.collection('payments').get();
        for (let doc of existingSnap.data) existing.add(`${doc.date || ''}|${doc.acc || ''}|${doc.actual || 0}|${doc.cur || ''}`);
        let success = 0, dup = 0, err = 0, maxOrder = Date.now();
        for (let record of recordsList) {
            if (!record.amount || record.amount <= 0) { err++; continue; }
            let fp = `${record.date}|${record.account}|${record.amount}|${record.currency}`;
            if (mode === 'smart' && existing.has(fp)) { dup++; continue; }
            existing.add(fp);
            let rate = record.currency === "CNY" ? 1 : 6.85;
            let rmb = record.currency === "CNY" ? record.amount : record.amount * rate;
            let status = (record.contract && record.customer && record.customer !== "-") ? "已入账" : "待认领";
            await db.collection('payments').add({
                actual: record.amount, cur: record.currency, rate, rmbValue: parseFloat(rmb.toFixed(2)),
                acc: record.account, contract: record.contract || "", customer: record.customer || "-",
                recorder: status === "已入账" ? (record.staff || "") : "", status, date: record.date,
                fee: record.fee || 0, orderSeq: maxOrder + success, createTime: new Date()
            });
            success++;
        }
        alert(`${sourceName}\n新增: ${success} 条\n重复跳过: ${dup} 条\n无效: ${err} 条`);
        if (success > 0) refreshAllData();
    }

    window.importExcel = async () => {
        if (!db) {
            alert("数据库未连接，请稍后重试或刷新页面");
            return;
        }
        if (!(isFinance || isAdmin)) return alert("无权限");
        const fileInput = document.getElementById('excelFileInput');
        const file = fileInput.files[0];
        if (!file) {
            alert("请先选择Excel文件");
            return;
        }
        console.log("开始读取文件:", file.name);
        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
                if (rows.length === 0) {
                    alert("Excel中没有数据行");
                    return;
                }

                const columns = Object.keys(rows[0]);
                console.log("原始列名:", columns);
                alert("识别到的列名：\n" + columns.join("\n"));

                // 匹配关键列
                const amountCol = matchColumn(columns, ["收款金额", "实到金额", "金额", "到账金额", "美金", "美元"]);
                const accountCol = matchColumn(columns, ["账户", "银行"]);
                const currencyCol = matchColumn(columns, ["币种", "currency"]);
                const dateCol = matchColumn(columns, ["到账日期", "日期", "date"]);
                const contractCol = matchColumn(columns, ["合同号", "pi", "订单号"]);
                const customerCol = matchColumn(columns, ["客户名称", "客户", "国家"]);
                const staffCol = matchColumn(columns, ["业务", "负责人"]);
                const feeCol = matchColumn(columns, ["手续费", "fee"]);

                if (!amountCol) {
                    alert("未找到金额列！请确保列名包含'收款金额'、'实到金额'、'金额'等关键词。\n识别到的列名：" + columns.join(", "));
                    return;
                }
                console.log(`匹配结果: 金额列=${amountCol}, 账户列=${accountCol}, 币种列=${currencyCol}, 日期列=${dateCol}, 合同列=${contractCol}, 客户列=${customerCol}, 业务员列=${staffCol}, 手续费列=${feeCol}`);

                let records = [];
                for (let row of rows) {
                    let amount = null;
                    let val = row[amountCol];
                    if (val !== undefined && val !== null && val !== "") {
                        let num = parseFloat(String(val).replace(/,/g, ''));
                        if (!isNaN(num) && num > 0) amount = num;
                    }
                    if (!amount) {
                        console.warn("跳过无金额行:", row);
                        continue;
                    }

                    let account = accountCol ? String(row[accountCol]).trim() : "中行";
                    let currency = currencyCol ? String(row[currencyCol]).toUpperCase().trim() : "USD";
                    if (account.includes("VTB")) currency = "CNY";

                    let dateStr = dateCol ? row[dateCol] : "";
                    const finalDate = parseDate(dateStr);

                    let contract = contractCol ? String(row[contractCol]).trim() : "";
                    let customer = customerCol ? String(row[customerCol]).trim() : "-";
                    let staff = staffCol ? String(row[staffCol]).trim() : "";

                    let fee = 0;
                    if (feeCol && row[feeCol] !== undefined && row[feeCol] !== "") {
                        let num = parseFloat(String(row[feeCol]).replace(/,/g, ''));
                        if (!isNaN(num)) fee = num;
                    }

                    records.push({ amount, account, currency, date: finalDate, contract, customer, staff, fee });
                }
                console.log("待导入记录数:", records.length);
                if (records.length === 0) {
                    alert("未从Excel中识别到任何有效金额数据。");
                    return;
                }
                await importRecords(records, `Excel (${records.length}条)`);
            } catch (err) {
                console.error("导入过程出错:", err);
                alert("导入失败: " + err.message);
            }
        };
        reader.onerror = (err) => {
            console.error("文件读取失败", err);
            alert("文件读取失败");
        };
        reader.readAsArrayBuffer(file);
    };

    window.showPasteModal = () => {
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `<div style="background:white;border-radius:24px;padding:24px;max-width:500px;"><h3>粘贴板导入</h3><textarea id="pasteData" rows="4" placeholder="例如：收乌兹别克斯坦 E260404F01 货款1284元 手续费15元"></textarea><div style="margin-top:16px;"><button onclick="this.closest('.modal').remove()">取消</button><button class="btn btn-primary" onclick="executePaste()">导入</button></div></div>`;
        document.body.appendChild(modal);
    };
    window.executePaste = async () => {
        if (!db) { alert("数据库未连接"); return; }
        let text = document.querySelector('#pasteData')?.value;
        if (!text) { alert("请粘贴数据"); return; }
        let amountMatch = text.match(/(\d+(?:\.\d{1,2})?)\s*元/);
        let amount = amountMatch ? parseFloat(amountMatch[1]) : null;
        if (!amount) { alert("未识别到金额"); return; }
        let contractMatch = text.match(/([A-Z]{1,2}\d{6}[A-Z]\d{2,3})/i);
        let contract = contractMatch ? contractMatch[1].toUpperCase() : "";
        let feeMatch = text.match(/手续费[：:]\s*(\d+(?:\.\d{1,2})?)/i);
        let fee = feeMatch ? parseFloat(feeMatch[1]) : 0;
        let records = [{
            amount, account: "中行", currency: "CNY", date: new Date().toISOString().slice(0,10),
            contract, customer: "-", staff: currentUser, fee
        }];
        await importRecords(records, "粘贴板");
        if (window.pasteModal) window.pasteModal.remove();
    };

    window.exportData = async () => {
        if (!db) { alert("数据库未连接"); return; }
        if (!(isFinance || isAdmin)) return alert("无权限");
        let filtered = getFilteredRecords();
        if (filtered.length === 0) return alert("无数据");
        let data = [];
        for (let i = 0; i < filtered.length; i++) {
            const r = filtered[i];
            let freight = freightCache[getFreightId(r)] || { amount: '', detail: '' };
            let obj = {
                "序号": i+1, "到账日期": r.date, "账户": r.acc, "币种": r.cur,
                "到账金额": r.actual, "手续费": r.fee || 0, "实到金额": (r.actual - (r.fee||0)),
                "折算人民币": r.rmbValue, "合同号": r.contract, "客户": r.customer,
                "运费": freight.amount || '未登记', "运费明细": freight.detail || '',
                "负责人": r.recorder
            };
            for (let f of customFields) obj[f.name] = (r.customFields && r.customFields[f.name]) || '-';
            data.push(obj);
        }
        let ws = XLSX.utils.json_to_sheet(data);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "到款明细");
        XLSX.writeFile(wb, `到款明细_${new Date().toISOString().slice(0,10)}.xlsx`);
        alert("已导出 " + data.length + " 条");
    };

    // 测试连接按钮
    document.getElementById('testConnBtn').onclick = async () => {
        const ok = await initCloudBase();
        if (ok) await refreshAllData();
    };

    // 初始化页面：填充用户列表，尝试连接CloudBase
    populateUserSelect();
    initCloudBase();
</script>
