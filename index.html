<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMP财务协作系统（修复版）</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #eef2f6; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; padding: 16px 20px; border-radius: 20px; border: 1px solid #e2edf2; }
        .stat-val { font-size: 28px; font-weight: 800; margin-top: 6px; display: block; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; background: white; padding: 14px 18px; border-radius: 24px; margin-bottom: 20px; border: 1px solid #e2edf2; }
        .btn { border: none; padding: 8px 18px; border-radius: 40px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
        .btn-primary { background: #0f3b5c; color: white; }
        .btn-success { background: #166534; color: white; }
        .btn-warning { background: #ea580c; color: white; }
        .btn-danger { background: #b91c1c; color: white; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; color: #1e293b; }
        .filter-group { display: flex; gap: 8px; align-items: center; background: #f1f5f9; padding: 5px 12px; border-radius: 40px; }
        .filter-group input { background: transparent; border: none; padding: 6px 0; outline: none; width: 200px; }
        .table-wrapper { background: white; border-radius: 20px; border: 1px solid #e2edf2; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1200px; }
        th { background: #f8fafc; padding: 14px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid #e2e8f0; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; }
        .pending-row { background-color: #fff9eb !important; }
        .badge-wait { background: #fee2e2; color: #b91c1c; padding: 2px 8px; border-radius: 40px; font-size: 11px; display: inline-block; }
        .badge-done { background: #dcfce7; color: #15803d; padding: 2px 8px; border-radius: 40px; font-size: 11px; display: inline-block; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 12px; margin: 0 2px; padding: 4px 8px; border-radius: 30px; }
        .action-btn.claim { background: #fef3c7; color: #b45309; }
        .action-btn.del { color: #9ca3af; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between">
        <h1><i class="fas fa-hand-holding-usd"></i> EMP 财务协作系统</h1>
    </div>

    <div class="dashboard">
        <div class="stat-card"><span>待认领</span><span class="stat-val" id="statPending">0</span></div>
        <div class="stat-card"><span>总到款笔数</span><span class="stat-val" id="statTotal">0</span></div>
        <div class="stat-card"><span>RMB总额</span><span class="stat-val" id="statTotalRmb">¥0.00</span></div>
    </div>

    <div class="toolbar">
        <button class="btn btn-success" onclick="exportData()">导出Excel</button>
        <div class="filter-group"><input type="text" id="searchInput" placeholder="合同号/客户" onkeyup="simpleFilter()"></div>
        <div class="spacer"></div>
        <input type="file" id="excelFileInput" accept=".xlsx, .xls">
        <button class="btn btn-warning" onclick="importExcel()">导入Excel</button>
        <button class="btn btn-danger" onclick="clearAllData()">一键清空</button>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr><th>#</th><th>操作</th><th>状态</th><th>到账日期</th><th>账户</th><th>合同号</th><th>客户</th><th>币种</th><th>金额</th><th>手续费</th><th>实到金额</th><th>折算RMB</th><th>负责人</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyD0CC3t1v6NbzLrpa1xMlJJKKLk93YvrY8",
        authDomain: "emp-finance.firebaseapp.com",
        projectId: "emp-finance",
        storageBucket: "emp-finance.firebasestorage.app",
        messagingSenderId: "5427570954",
        appId: "1:5427570954:web:87b30235589b5e413b32f3"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();
    
    let allRecords = [];
    let unsubscribe = null;
    let currentUser = '';
    
    // 人员列表（仅保留可登录人员）
    const ALL_STAFF = ["王丽娜", "李月", "李洋洋", "谭硕", "曲宁", "常超", "于圣一", "张娜", "孙秋迪"];
    const passwords = {
        "王丽娜": "555", "李月": "666", "李洋洋": "666",
        "谭硕": "888", "曲宁": "888", "常超": "888", "于圣一": "888",
        "张娜": "888", "孙秋迪": "888"
    };
    
    function verifyLogin(user, pwd) { return passwords[user] === pwd; }
    
    // 登录弹窗
    function showLoginModal() {
        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div style="background:white;border-radius:24px;padding:24px;max-width:350px;text-align:center;">
                <h3>EMP 财务协作</h3>
                <div style="margin:16px 0;"><input type="password" id="loginPass" placeholder="密码" style="width:100%;padding:12px;border-radius:40px;"></div>
                <div style="margin:16px 0;"><select id="loginUser" style="width:100%;padding:12px;border-radius:40px;">${ALL_STAFF.map(n => `<option value="${n}">${n}</option>`).join('')}</select></div>
                <button class="btn btn-primary" onclick="handleLogin()" style="width:100%;">进入</button>
            </div>
        `;
        document.body.appendChild(modal);
        window.loginModal = modal;
    }
    
    window.handleLogin = function() {
        const pwd = document.getElementById('loginPass').value;
        const user = document.getElementById('loginUser').value;
        if (!verifyLogin(user, pwd)) { alert('密码错误'); return; }
        currentUser = user;
        if (window.loginModal) window.loginModal.remove();
        loadData();
    };
    
    // 加载数据
    function loadData() {
        if (unsubscribe) unsubscribe();
        unsubscribe = db.collection("payments").orderBy("orderSeq", "asc").onSnapshot(snap => {
            allRecords = [];
            snap.forEach(doc => {
                let d = doc.data();
                // 修正币种和汇率
                if (d.acc && d.acc.includes("VTB")) d.cur = "CNY";
                if (d.cur === "CNY") { d.rate = 1; d.rmbValue = d.actual || 0; }
                else if (!d.rate) d.rate = 6.85;
                if (d.rmbValue === undefined && d.actual) d.rmbValue = d.cur === "CNY" ? d.actual : d.actual * d.rate;
                allRecords.push({ id: doc.id, ...d });
            });
            console.log(`✅ 已加载 ${allRecords.length} 条记录`);
            // 直接渲染，不做任何筛选（除了搜索框）
            renderTable();
        });
    }
    
    // 简单筛选（仅基于合同号/客户）
    function simpleFilter() {
        renderTable();
    }
    
    function renderTable() {
        const tbody = document.getElementById('tableBody');
        if (!tbody) {
            console.error("❌ 未找到 tableBody 元素");
            return;
        }
        
        let searchTerm = document.getElementById('searchInput')?.value || '';
        let filtered = allRecords;
        if (searchTerm) {
            let term = searchTerm.toLowerCase();
            filtered = allRecords.filter(r => 
                (r.contract || '').toLowerCase().includes(term) || 
                (r.customer || '').toLowerCase().includes(term)
            );
        }
        
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;padding:40px;">暂无数据，请导入Excel或检查筛选条件</td></tr>';
            updateStats();
            return;
        }
        
        let html = '';
        for (let i = 0; i < filtered.length; i++) {
            const r = filtered[i];
            let isPending = r.status === '待认领';
            let canClaim = isPending && currentUser;
            let feeAmount = r.fee || 0;
            let actualAmount = (r.actual || 0) - feeAmount;
            
            html += `<tr class="${isPending ? 'pending-row' : ''}">
                <td>${i+1}</td>
                <td>${canClaim ? `<button class="action-btn claim" onclick="claim('${r.id}')">认领</button>` : ''}</td>
                <td>${isPending ? '<span class="badge-wait">待认领</span>' : '<span class="badge-done">已入账</span>'}</td>
                <td>${r.date || ''}</td>
                <td>${r.acc || ''}</td>
                <td><strong>${r.contract || '—'}</strong></td>
                <td>${r.customer || '—'}</td>
                <td>${r.cur || 'USD'}</td>
                <td>${(r.actual || 0).toLocaleString()}</td>
                <td>${feeAmount > 0 ? feeAmount.toFixed(2) : '-'}</td>
                <td>${actualAmount.toLocaleString()}</td>
                <td>¥ ${(r.rmbValue || 0).toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                <td>${r.recorder || '未认领'}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
        updateStats();
    }
    
    function updateStats() {
        let pending = allRecords.filter(r => r.status === '待认领').length;
        let totalRmb = allRecords.reduce((s, r) => s + (r.rmbValue || 0), 0);
        document.getElementById('statPending').innerText = pending;
        document.getElementById('statTotal').innerText = allRecords.length;
        document.getElementById('statTotalRmb').innerHTML = '¥ ' + totalRmb.toLocaleString(undefined, {minimumFractionDigits: 2});
    }
    
    window.claim = async (id) => {
        let r = allRecords.find(x => x.id === id);
        if (!r || r.status !== '待认领') return alert('不可认领');
        let contract = prompt("合同号", r.contract || "");
        if (!contract) return;
        let customer = prompt("客户名称", r.customer || "");
        if (!customer) return;
        let cleanContract = contract.trim().replace(/\s/g, '');
        await db.collection("payments").doc(id).update({ contract: cleanContract, customer: customer.trim(), status: "已入账", recorder: currentUser });
        alert("认领成功");
    };
    
    window.clearAllData = async () => {
        const pwd = prompt("清空所有数据需要密码111：");
        if (pwd !== '111') { alert("密码错误"); return; }
        if (!confirm("确认删除全部数据？")) return;
        let snap = await db.collection("payments").get();
        let batch = db.batch();
        snap.forEach(doc => batch.delete(doc.ref));
        await batch.commit();
        alert("已清空 " + snap.size + " 条记录");
        location.reload();
    };
    
    window.importExcel = async () => {
        let file = document.getElementById('excelFileInput').files[0];
        if (!file) return alert("请选择Excel文件");
        let reader = new FileReader();
        reader.onload = async (e) => {
            let workbook = XLSX.read(e.target.result, { type: 'array' });
            let sheet = workbook.Sheets[workbook.SheetNames[0]];
            let rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
            let records = [];
            for (let row of rows) {
                let amount = null;
                for (let key of ["收款金额", "实到金额", "金额", "到账金额"]) {
                    for (let col in row) {
                        if (String(col).toLowerCase().includes(key.toLowerCase())) {
                            let v = row[col];
                            if (v !== undefined && v !== null && v !== "") {
                                let num = parseFloat(String(v).replace(/,/g, ''));
                                if (!isNaN(num) && num > 0) { amount = num; break; }
                            }
                        }
                    }
                    if (amount) break;
                }
                if (!amount) continue;
                
                let account = "中行";
                for (let c in row) if (String(c).toLowerCase().includes("账户")) { account = String(row[c]).trim(); break; }
                let currency = "USD";
                for (let c in row) if (String(c).toLowerCase().includes("币种")) { let v = String(row[c]).toUpperCase().trim(); if (v === "CNY" || v === "USD") currency = v; break; }
                if (account.includes("VTB")) currency = "CNY";
                let dateStr = "";
                for (let c in row) if (String(c).toLowerCase().includes("到账日期")) { dateStr = row[c]; break; }
                let finalDate = dateStr ? new Date(dateStr).toISOString().slice(0,10) : new Date().toISOString().slice(0,10);
                let contract = "";
                for (let c in row) if (String(c).toLowerCase().includes("合同号")) { contract = String(row[c]).trim(); break; }
                let customer = "";
                for (let c in row) if (String(c).toLowerCase().includes("客户")) { customer = String(row[c]).trim(); break; }
                if (!customer) customer = "-";
                let staff = "";
                for (let c in row) if (String(c).toLowerCase().includes("业务")) { staff = String(row[c]).trim(); break; }
                let fee = 0;
                for (let c in row) if (String(c).toLowerCase().includes("手续费")) { let v = row[c]; if (v !== undefined && v !== null && v !== "") { let num = parseFloat(String(v).replace(/,/g, '')); if (!isNaN(num)) { fee = num; break; } } }
                records.push({ amount, account, currency, date: finalDate, contract, customer, staff, fee });
            }
            let batch = db.batch();
            let maxOrder = Date.now();
            for (let i = 0; i < records.length; i++) {
                let r = records[i];
                let rate = r.currency === "CNY" ? 1 : 6.85;
                let rmb = r.currency === "CNY" ? r.amount : r.amount * rate;
                let status = (r.contract && r.customer && r.customer !== "-") ? "已入账" : "待认领";
                let docRef = db.collection("payments").doc();
                batch.set(docRef, {
                    actual: r.amount, cur: r.currency, rate, rmbValue: parseFloat(rmb.toFixed(2)),
                    acc: r.account, contract: r.contract || "", customer: r.customer || "-",
                    recorder: status === "已入账" ? (r.staff || "") : "", status, date: r.date,
                    fee: r.fee || 0, orderSeq: maxOrder + i,
                    createTime: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            await batch.commit();
            alert(`✅ 导入完成！新增 ${records.length} 条记录`);
            document.getElementById('excelFileInput').value = '';
            loadData();
        };
        reader.readAsArrayBuffer(file);
    };
    
    window.exportData = () => {
        if (allRecords.length === 0) return alert("无数据");
        let data = allRecords.map((r, idx) => ({
            "序号": idx+1, "到账日期": r.date, "账户": r.acc, "币种": r.cur,
            "到账金额": r.actual, "手续费": r.fee || 0, "实到金额": (r.actual - (r.fee||0)),
            "折算人民币": r.rmbValue, "合同号": r.contract, "客户": r.customer, "负责人": r.recorder
        }));
        let ws = XLSX.utils.json_to_sheet(data);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "到款明细");
        XLSX.writeFile(wb, `到款明细_${new Date().toISOString().slice(0,10)}.xlsx`);
        alert("已导出 " + data.length + " 条");
    };
    
    showLoginModal();
</script>
</body>
</html>
